{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<section class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-6 col-lg-5">
        <div class="form-card">
          <div class="auth-icon-wrap">
            <i class="bi bi-key-fill" style="font-size:2rem;color:var(--blood-red);"></i>
          </div>
          <h2 class="auth-heading">Reset Password</h2>
          <p class="auth-sub">Enter your email and we'll send a secure reset link</p>
          <form method="POST">
            <div class="mb-4">
              <label class="form-label">Email Address</label>
              <input type="email" name="email" class="form-control"
                     placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-red w-100 py-2">
              <i class="bi bi-send me-2"></i>Send Reset Link
            </button>
          </form>
          <p class="text-center mt-4 mb-0" style="font-size:.85rem;">
            <a href="{{ url_for('login') }}" style="color:var(--text-muted);">← Back to Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
