{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<section class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-6 col-lg-5">
        <div class="form-card" id="resetCard">
          <div class="auth-icon-wrap">
            <i class="bi bi-shield-lock" style="font-size:2rem;color:var(--blood-red);"></i>
          </div>
          <h2 class="auth-heading">New Password</h2>
          <p class="auth-sub">Enter and confirm your new password</p>
          <form method="POST" action="{{ url_for('reset_password_submit') }}" novalidate>
            <input type="hidden" name="access_token" id="tok">
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <div class="input-group">
                <input type="password" name="password" id="rp1" class="form-control"
                       placeholder="Min 8 chars" required>
                <button type="button" class="btn btn-outline-secondary btn-eye"
                        onclick="togglePw('rp1',this)"><i class="bi bi-eye"></i></button>
              </div>
              <div class="form-text">8+ chars, uppercase, lowercase, digit, symbol</div>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm New Password</label>
              <div class="input-group">
                <input type="password" name="confirm_password" id="rp2" class="form-control"
                       placeholder="Repeat password" required>
                <button type="button" class="btn btn-outline-secondary btn-eye"
                        onclick="togglePw('rp2',this)"><i class="bi bi-eye"></i></button>
              </div>
              <div id="matchMsg" class="form-text"></div>
            </div>
            <button type="submit" class="btn btn-red w-100 py-2">
              <i class="bi bi-check-lg me-2"></i>Update Password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  var h=new URLSearchParams(window.location.hash.substring(1));
  var tok=p.get('access_token')||h.get('access_token')||'';
  document.getElementById('tok').value=tok;
  if(!tok){
    document.getElementById('resetCard').innerHTML=
      '<div class="text-center py-4">'+
      '<i class="bi bi-x-circle-fill" style="font-size:3rem;color:var(--blood-red);"></i>'+
      '<h5 class="mt-3 fw-bold">Invalid or expired link</h5>'+
      '<a href="/forgot-password" class="btn btn-red mt-3">Request New Link</a></div>';
  }
})();
function togglePw(id,btn){
  var f=document.getElementById(id),show=f.type==='text';
  f.type=show?'password':'text';
  btn.querySelector('i').className=show?'bi bi-eye':'bi bi-eye-slash';
}
document.getElementById('rp2').addEventListener('input',function(){
  var m=document.getElementById('matchMsg');
  m.innerHTML=this.value===document.getElementById('rp1').value
    ?'<span style="color:green"><i class="bi bi-check-circle"></i> Match</span>'
    :'<span style="color:red"><i class="bi bi-x-circle"></i> No match</span>';
});
</script>
{% endblock %}
